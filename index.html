<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#05070a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>JMF ADMIN | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest-admin.json">
    <link rel="apple-touch-icon" href="icon-admin-192.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #0f172a; --primary: #00d4ff; --secondary: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.15);
            --danger: #ef4444; --success: #10b981; --warning: #fbbf24;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 30px; }
        
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box {
            background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        .login-box input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155;
            background: #000; color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none;
        }

        #dashboard { display: none; }
        .header { background: var(--panel); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 800; }
        
        .tab-nav { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 18px; background: transparent; border: none; color: var(--text-muted); font-weight: 800; cursor: pointer; border-bottom: 4px solid transparent; transition: 0.3s; font-size: 16px; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(0, 212, 255, 0.05); }

        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .main-content { max-width: 1200px; margin: 0 auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 10px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 9px; margin: 0 0 4px 0; color: var(--text-muted); text-transform: uppercase; }
        .stat-card .val { font-size: 18px; font-weight: 800; color: #fff; }
        
        .action-box { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .action-box h2 { font-size: 17px; margin-bottom: 18px; color: var(--secondary); font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: var(--text-muted); font-weight: 800; margin-bottom: 6px; display: block; }
        input, select {
            background: #000; border: 1px solid #334155; color: #fff;
            padding: 14px; border-radius: 12px; font-size: 14px; outline: none; width: 100%; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #000; font-weight: 800; padding: 16px; border-radius: 12px;
            cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        .btn:active { transform: scale(0.97); }

        .search-box { margin-bottom: 15px; position: relative; }
        .search-box input { background: var(--panel); border: 1px solid var(--border); padding: 14px 45px 14px 15px; border-radius: 15px; color: #fff; width: 100%; }
        .search-box svg { position: absolute; right: 15px; top: 15px; color: var(--primary); }

        .table-box { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: rgba(0, 212, 255, 0.08); padding: 16px; color: var(--primary); font-size: 13px; font-weight: 800; border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 6px; }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .offline { background: #475569; }
        
        .trading-status { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 12px; }
        .t-active { color: var(--primary); }
        .t-idle { color: var(--text-muted); }

        .device-id { font-family: monospace; font-size: 11px; color: var(--warning); background: rgba(251, 191, 36, 0.05); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(251, 191, 36, 0.1); }

        .action-btns { display: flex; gap: 8px; }
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .icon-btn i { width: 14px; height: 14px; }
        .icon-btn.copy { color: var(--primary); border-color: rgba(0, 212, 255, 0.2); }
        .icon-btn.del { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .icon-btn:active { background: rgba(255,255,255,0.15); }

        .admin-badge {
            background: #ef4444; color: #fff; font-size: 10px; font-weight: 800;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }
        .tab-badge { margin-right: 8px; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: #000; padding: 14px 30px; border-radius: 40px;
            font-weight: 800; font-size: 14px; z-index: 3000; display: none; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Messaging - Modern Styles */
        .msg-box {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background: linear-gradient(to bottom, rgba(5,7,10,0.2), rgba(10,15,25,0.4));
            scroll-behavior: smooth;
        }
        .msg {
            max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 13px;
            line-height: 1.5; position: relative; word-wrap: break-word;
            animation: msgPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes msgPop { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg.user { 
            align-self: flex-start; background: rgba(30, 41, 59, 0.8); 
            color: #e2e8f0; border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .msg.admin { 
            align-self: flex-end; background: linear-gradient(135deg, var(--primary), #00a3cc); 
            color: #000; border-bottom-right-radius: 4px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        .msg.user .msg-time { text-align: left; }
        
        .msg img {
            max-width: 100%; max-height: 250px; border-radius: 10px;
            display: block; margin: 5px 0; object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }

        /* Admin Action Sheet */
        #admin-action-sheet, #admin-edit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000;
            display: none; align-items: center; justify-content: center;
        }
        .admin-sheet-box {
            position: absolute; bottom: 0; width: 100%; max-width: 500px;
            background: #1e293b; border-top: 2px solid var(--primary);
            border-radius: 20px 20px 0 0; padding: 20px; animation: slideUp 0.3s ease;
        }
        .admin-action-btn {
            display: flex; align-items: center; gap: 15px; width: 100%;
            padding: 15px; border: none; background: rgba(255,255,255,0.03);
            color: #fff; border-radius: 12px; margin-bottom: 10px; cursor: pointer;
            font-weight: 600; transition: 0.2s;
        }
        .admin-action-btn:hover { background: rgba(0, 212, 255, 0.1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Mobile View Optimization */
        @media (max-width: 900px) {
            table thead { display: none; }
            table tr { 
                display: block; 
                background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.4)); 
                margin: 15px 0; 
                border: 1px solid var(--border); 
                border-radius: 20px; 
                padding: 20px; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            }
            table td { 
                display: flex; 
                justify-content: space-between; 
                align-items: flex-start; 
                padding: 12px 0; 
                border: none; 
                text-align: left;
                gap: 15px;
            }
            table td:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.03); }
            table td::before { 
                content: attr(data-label); 
                font-weight: 800; 
                color: var(--primary); 
                font-size: 11px; 
                white-space: nowrap;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح ✅</div>

    <!-- Admin Action Sheet -->
    <div id="admin-action-sheet" onclick="this.style.display='none'">
        <div class="admin-sheet-box" onclick="event.stopPropagation()">
            <div style="width:40px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 auto 15px auto;"></div>
            <h3 style="margin:0 0 20px 0; font-size:14px; color:var(--text-muted); text-align:center;">إجراءات الرسالة</h3>
            <button class="admin-action-btn" onclick="copyAdminMsg()">
                <i data-lucide="copy" style="width:20px; color:var(--primary);"></i> نسخ النص
            </button>
            <button class="admin-action-btn" onclick="openAdminEdit()">
                <i data-lucide="edit-3" style="width:20px; color:var(--primary);"></i> تعديل الرسالة
            </button>
            <button class="admin-action-btn" style="color:#ef4444;" onclick="deleteAdminMsg()">
                <i data-lucide="trash-2" style="width:20px;"></i> حذف الرسالة
            </button>
        </div>
    </div>

    <!-- Admin Edit Modal -->
    <div id="admin-edit-modal">
        <div style="background:#1e293b; width:90%; max-width:400px; padding:25px; border-radius:20px; border:1px solid var(--border);">
            <h3 style="margin:0 0 15px 0; color:var(--primary);">تعديل رسالة</h3>
            <textarea id="admin-edit-input" style="width:100%; height:120px; background:#000; border:1px solid var(--border); border-radius:12px; color:#fff; padding:12px; outline:none; margin-bottom:20px; resize:none;"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1;" onclick="saveAdminEdit()">حفظ</button>
                <button class="btn" style="flex:1; background:#475569;" onclick="document.getElementById('admin-edit-modal').style.display='none'">إلغاء</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary); font-weight: 800; letter-spacing: 2px;">JMF ADMIN</h2>
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="checkPass()">دخول آمن</button>
            <p id="login-err" style="color: var(--danger); margin-top: 15px; display: none;">❌ كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>JMF Admin Panel</h1>
            <button class="icon-btn" onclick="location.reload()" style="color:var(--danger)">خروج</button>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('home', this)">الرئيسية</button>
            <button class="tab-btn" onclick="switchTab('clients', this)">العملاء</button>
            <button class="tab-btn" onclick="switchTab('chats', this); loadChatList();" style="display:flex; align-items:center; justify-content:center; gap:5px;">
                المراسلات 💬 <span id="total-unread" class="admin-badge" style="display:none;">0</span>
            </button>
        </div>

        <div class="main-content">
            <div id="tab-home" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card"><h3>إجمالي المشتركين</h3><div id="stat-total" class="val">0</div></div>
                    <div class="stat-card"><h3>متصل الآن</h3><div id="stat-active-now" class="val" style="color:var(--success)">0</div></div>
                    <div class="stat-card"><h3>تداول نشط</h3><div id="stat-trading-now" class="val" style="color:var(--primary)">0</div></div>
                </div>
                <div class="action-box">
                    <h2>🔑 توليد سيريال جديد</h2>
                    <input type="text" id="new-key" readonly style="letter-spacing: 2px; color: var(--primary); font-weight: 800; font-size: 18px; text-align: center; margin-bottom:15px;">
                    <select id="duration" style="margin-bottom:15px;">
                        <option value="0.000694">دقيقة واحدة (تجربة)</option>
                        <option value="30">شهر واحد (Standard)</option>
                        <option value="90">3 أشهر (Professional)</option>
                        <option value="365">سنة كاملة (Enterprise)</option>
                        <option value="9999">مدى الحياة (Unlimited)</option>
                    </select>
                    <input type="text" id="client-name" placeholder="اسم العميل..." style="margin-bottom:15px;">
                    <button class="btn" onclick="generateLicense()">إنشاء وتفعيل ونسخ السيريال</button>
                </div>
            </div>

            <div id="tab-clients" class="tab-content">
                <div class="search-box">
                    <i data-lucide="search" style="position:absolute; right:15px; top:15px; color:var(--primary); width:18px"></i>
                    <input type="text" id="search-input" placeholder="ابحث بالاسم، السيريال، أو ID الجهاز..." oninput="filterList()">
                </div>
                <div class="table-box">
                    <table>
                        <thead>
                            <tr><th>العميل</th><th>الاتصال</th><th>السيريال</th><th>حالة التداول</th><th>ID الجهاز</th><th>تاريخ الانتهاء</th><th>إجراءات</th></tr>
                        </thead>
                        <tbody id="license-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-chats" class="tab-content">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; height: calc(100vh - 180px);">
                    <div style="background: var(--panel); border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;">
                        <div style="padding: 12px; border-bottom: 1px solid var(--border); background: rgba(0,212,255,0.05);"><h3 style="margin:0; font-size:14px; color:var(--primary);">المحادثات</h3></div>
                        <div id="chat-list" style="overflow-y: auto; flex: 1;"></div>
                    </div>
                    <div style="background: var(--panel); border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;">
                        <div id="chat-header" style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: rgba(0,212,255,0.05);">
                            <div style="width: 10px; height: 10px; border-radius: 50%; background: #475569;" id="active-chat-status"></div>
                            <h3 style="margin:0; font-size:14px; color:#fff;" id="active-chat-name">اختر عميل</h3>
                        </div>
                        <div id="chat-msg-box" class="msg-box"></div>
                        <div style="padding: 12px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); display: flex; gap: 10px;">
                            <input type="file" id="chat-file" style="display:none;" accept="image/*" onchange="sendImage()">
                            <button class="icon-btn" onclick="document.getElementById('chat-file').click()"><i data-lucide="image"></i></button>
                            <input type="text" id="chat-input" placeholder="رسالة..." style="flex:1; background:#000; padding:10px; border-radius:10px; border:1px solid #334155; color:#fff;" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()" style="background:var(--primary); border:none; padding:0 20px; border-radius:10px; cursor:pointer;">إرسال</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/licenses";
        const DEV_URL = "https://jmf-bot-default-rtdb.firebaseio.com/devices";
        const CHATS_URL = "https://jmf-bot-default-rtdb.firebaseio.com/chats";
        const ADMIN_PASS = "778899";
        let allData = {}, readCounts = JSON.parse(localStorage.getItem('jmf_read_counts') || "{}"), unreadMap = {}, activeChatHWID = null, chatInterval = null;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
            lucide.createIcons();
        }

        async function checkPass() {
            if(document.getElementById('admin-pass').value === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                setInterval(fetchLicenses, 3000); fetchLicenses();
            } else { document.getElementById('login-err').style.display = 'block'; }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        async function fetchLicenses() {
            const [res1, res2] = await Promise.all([fetch(`${FB_URL}.json`), fetch(`${DEV_URL}.json`)]);
            allData = await res1.json() || {};
            renderTable(allData);
            if(activeChatHWID) loadMessages();
        }

        function renderTable(data) {
            const tbody = document.getElementById('license-table');
            tbody.innerHTML = "";
            Object.keys(data).forEach(k => {
                const item = data[k];
                const tr = document.createElement('tr');
                tr.innerHTML = `<td data-label="العميل">${item.client || '-'}</td><td data-label="الاتصال">${item.last_seen && Date.now() - item.last_seen < 120000 ? 'متصل' : 'أوفلاين'}</td><td data-label="السيريال">${k}</td><td data-label="حالة التداول">${item.is_trading ? 'يتداول' : 'متوقف'}</td><td data-label="ID الجهاز">${item.device_id || '---'}</td><td data-label="تاريخ الانتهاء">${new Date(item.expiry).toLocaleDateString()}</td><td><button class="icon-btn del" onclick="deleteLicense('${k}')">حذف</button></td>`;
                tbody.appendChild(tr);
            });
        }

        async function loadMessages() {
            if(!activeChatHWID) return;
            try {
                const res = await fetch(`${CHATS_URL}/${activeChatHWID}/messages.json`);
                const messages = await res.json() || [];
                const msgBox = document.getElementById('chat-messages');
                
                const oldScrollTop = msgBox.scrollTop;
                const oldScrollHeight = msgBox.scrollHeight;
                
                msgBox.innerHTML = Object.keys(messages).map(k => {
                    const m = messages[k];
                    const isAdmin = m.sender === 'admin';
                    const isImg = m.type === 'image';
                    const content = isImg ? `<a href="${m.text}" target="_blank"><img src="${m.text}" style="max-width: 100%; border-radius: 10px; margin-top:5px; display:block;"></a>` : m.text;
                    
                    return `
                        <div style="align-self: ${isAdmin ? 'flex-end' : 'flex-start'}; max-width: 80%; background: ${isAdmin ? 'var(--secondary)' : 'rgba(255,255,255,0.05)'}; padding: 10px 15px; border-radius: 15px; border: 1px solid ${isAdmin ? 'transparent' : 'var(--border)'}; position: relative;">
                            <div style="color: #fff; font-size: 13px;">${content}</div>
                            <div style="font-size: 9px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px;">${new Date(m.timestamp).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    `;
                }).join('');

                // Sound notification for new messages
                const currentLastMsg = Object.keys(messages).pop();
                if(currentLastMsg && currentLastMsg !== lastMessageId) {
                    const lastMsg = messages[currentLastMsg];
                    if(lastMsg.sender === 'user' && lastMessageId !== null) {
                        document.getElementById('notif-sound').play().catch(()=>{});
                    }
                    lastMessageId = currentLastMsg;
                }

                if (msgBox.scrollHeight > oldScrollHeight) {
                    msgBox.scrollTop = msgBox.scrollHeight;
                }
            } catch (e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !activeChatHWID) return;

            const msg = {
                sender: 'admin',
                text: text,
                timestamp: Date.now()
            };

            input.value = "";
            
            // 1. Send to Firebase for Speed
            try {
                await fetch(`${CHATS_URL}/${activeChatHWID}/messages.json`, {
                    method: 'POST',
                    body: JSON.stringify(msg)
                });
                loadMessages();
                
                // 2. Save to GitHub for Permanence
                saveChatToGitHub(activeChatHWID);
            } catch (e) {
                alert("خطأ في الإرسال");
            }
        }

        async function saveChatToGitHub(hwid) {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo') || "lootb8890-hue/JMF-BOT-Updates";
            if(!token) return;

            try {
                // Fetch all messages from Firebase
                const res = await fetch(`${CHATS_URL}/${hwid}/messages.json`);
                const messages = await res.json() || {};
                
                const filePath = `chats/${hwid}.json`;
                const url = `https://api.github.com/repos/${repo}/contents/${filePath}`;
                const headers = { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" };

                const getFile = await fetch(url, { headers });
                let sha = null;
                if(getFile.ok) sha = (await getFile.json()).sha;

                await fetch(url, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify({
                        message: `Sync chat history for ${hwid}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2)))),
                        sha: sha
                    })
                });
            } catch (e) { console.error("GitHub Sync Error:", e); }
        }

        let liveInterval = null;

        async function viewLive(deviceId) {
            if(!deviceId || !devicesData[deviceId]) {
                return alert("⚠️ هذا العميل غير متصل حالياً أو لم يتم ربط جهازه.");
            }
            
            const tunnelUrl = devicesData[deviceId].tunnel_url || devicesData[deviceId].url;
            if(!tunnelUrl) return alert("⚠️ لم يتم العثور على رابط بث للعميل.");

            document.getElementById('details-modal').style.display = 'flex';
            document.getElementById('live-loading').style.display = 'block';
            document.getElementById('live-content').style.display = 'none';

            const updateData = async () => {
                try {
                    const res = await fetch(`${tunnelUrl}/api/data`, {
                        headers: { "ngrok-skip-browser-warning": "69420" }
                    });
                    if(!res.ok) throw new Error("Connection failed");
                    const data = await res.json();
                    const s = data.status;

                    document.getElementById('l-balance').innerText = '$' + s.balance.toFixed(2);
                    document.getElementById('l-equity').innerText = '$' + s.equity.toFixed(2);
                    document.getElementById('l-floating').innerText = (s.floating_profit >= 0 ? '+' : '') + '$' + s.floating_profit.toFixed(2);
                    document.getElementById('l-floating').style.color = s.floating_profit >= 0 ? '#10b981' : '#ef4444';
                    document.getElementById('l-today').innerText = (s.today_profit >= 0 ? '+' : '') + '$' + s.today_profit.toFixed(2);
                    document.getElementById('l-today').style.color = s.today_profit >= 0 ? '#10b981' : '#ef4444';
                    
                    if (s.stats) {
                        document.getElementById('l-winrate').innerText = s.stats.win_rate + '%';
                        document.getElementById('l-pf').innerText = s.stats.profit_factor;
                    }

                    // Render Open Trades
                    const openList = document.getElementById('l-open-list');
                    if (s.open_trades && s.open_trades.length > 0) {
                        openList.innerHTML = s.open_trades.map(t => `
                            <div style="background:rgba(255,255,255,0.03); margin-bottom:5px; border-radius:6px; display:flex; justify-content:space-between; padding:8px 12px; border-left:3px solid ${t.profit >= 0 ? '#10b981' : '#ef4444'};">
                                <div><b style="color:#fff; font-size:13px;">${t.symbol}</b> <br> <span style="font-size:10px; color:#aaa;">${t.type} ${t.volume}</span></div>
                                <div style="text-align:right;">
                                    <div style="color:${t.profit >= 0 ? '#10b981' : '#ef4444'}; font-weight:bold; font-size:14px;">${t.profit >= 0 ? '+' : ''}${t.profit.toFixed(2)}$</div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        openList.innerHTML = '<div style="padding:20px; text-align:center; color:#666; font-size:12px;">لا توجد صفقات مفتوحة</div>';
                    }

                    // Render History
                    const histList = document.getElementById('l-history-list');
                    if (s.history && s.history.length > 0) {
                        histList.innerHTML = s.history.slice(0, 10).map(h => `
                            <div style="background:rgba(255,255,255,0.03); margin-bottom:5px; border-radius:6px; display:flex; justify-content:space-between; padding:8px 12px; border-right:3px solid ${h.profit >= 0 ? '#10b981' : '#ef4444'};">
                                <div><b style="color:#fff; font-size:12px;">${h.symbol}</b> <br> <span style="font-size:9px; color:#888;">${h.type}</span></div>
                                <div style="color:${h.profit >= 0 ? '#10b981' : '#ef4444'}; font-weight:bold; font-size:13px;">${h.profit >= 0 ? '+' : ''}${h.profit.toFixed(2)}$</div>
                            </div>
                        `).join('');
                    } else {
                        histList.innerHTML = '<div style="padding:20px; text-align:center; color:#666; font-size:12px;">السجل فارغ</div>';
                    }

                    document.getElementById('live-loading').style.display = 'none';
                    document.getElementById('live-content').style.display = 'block';
                } catch (e) {
                    console.error(e);
                    if(!liveInterval) { // Only show error if it's the first fetch
                        document.getElementById('live-loading').innerHTML = `
                            <div style="color:var(--danger); padding:20px;">
                                ❌ فشل الاتصال برابط العميل.<br>
                                <small style="font-size:10px;">${e.message}</small>
                            </div>
                        `;
                    }
                }
            };
            await updateData();
            if(liveInterval) clearInterval(liveInterval);
            liveInterval = setInterval(updateData, 3000);
        }
        // Load saved token and repo on startup
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('gh_token');
            if(savedToken) document.getElementById('up-token')?.value || (document.getElementById('up-token') && (document.getElementById('up-token').value = savedToken));

            if(savedRepo) document.getElementById('up-repo')?.value || (document.getElementById('up-repo') && (document.getElementById('up-repo').value = savedRepo));
        });
