<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#05070a">
    <title>JMF ADMIN | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest-admin.json">
    <link rel="apple-touch-icon" href="icon-admin-192.png">
    <style>
        :root {
            --bg: #05070a; --panel: #0f172a; --primary: #00d4ff; --secondary: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.15);
            --danger: #ef4444; --success: #10b981; --warning: #fbbf24;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; padding-bottom: 20px; }
        
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box {
            background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        .login-box input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155;
            background: #000; color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none;
        }

        #dashboard { display: none; }
        .header { background: var(--panel); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 800; }
        
        /* Tab Navigation */
        .tab-nav { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 10px; gap: 5px; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; border: none; color: var(--text-muted); font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 15px; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(0, 212, 255, 0.05); }

        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .main-content { max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 10px; margin: 0 0 5px 0; color: var(--text-muted); }
        .stat-card .val { font-size: 20px; font-weight: 800; color: #fff; }
        
        .search-box { margin-bottom: 15px; position: relative; }
        .search-box input { background: var(--panel); border: 1px solid var(--border); padding: 12px 40px 12px 15px; border-radius: 12px; color: #fff; width: 100%; outline: none; font-size: 14px; }
        .search-box svg { position: absolute; right: 12px; top: 12px; color: var(--primary); }

        .action-box { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .action-box h2 { font-size: 16px; margin-bottom: 15px; color: var(--secondary); font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 5px; display: block; }
        input, select {
            background: #000; border: 1px solid #334155; color: #fff;
            padding: 12px; border-radius: 10px; font-size: 14px; outline: none; width: 100%;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #000; font-weight: 800; padding: 15px; border-radius: 10px;
            cursor: pointer; transition: 0.3s; width: 100%; font-size: 15px;
        }

        /* Table & Card View */
        .table-box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: rgba(0, 212, 255, 0.05); padding: 15px; color: var(--primary); font-size: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .offline { background: #475569; }
        
        .trading-badge { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 800; }
        .trading-active { background: rgba(0, 212, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .trading-idle { background: rgba(255,255,255,0.05); color: var(--text-muted); }

        .action-btns { display: flex; gap: 8px; }
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .icon-btn.copy { color: var(--primary); }
        .icon-btn.del { color: var(--danger); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: #000; padding: 12px 25px; border-radius: 30px;
            font-weight: 800; font-size: 13px; z-index: 3000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Mobile View: Row to Card */
        @media (max-width: 800px) {
            table thead { display: none; }
            table tr { display: block; background: rgba(255,255,255,0.02); margin: 10px; border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
            table td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border: none; }
            table td:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.03); }
            table td::before { content: attr(data-label); font-weight: 800; color: var(--primary); font-size: 11px; }
            .action-btns { width: 100%; justify-content: center; margin-top: 10px; gap: 15px; }
            .icon-btn { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح ✅</div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary); font-weight: 800;">JMF ADMIN</h2>
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="checkPass()">دخول آمن</button>
            <p id="login-err" style="color: var(--danger); margin-top: 15px; display: none;">❌ كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>JMF Admin Control</h1>
            <button class="icon-btn" onclick="location.reload()" style="color:var(--danger)">خروج</button>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('home', this)">الرئيسية</button>
            <button class="tab-btn" onclick="switchTab('clients', this)">العملاء</button>
        </div>

        <div class="main-content">
            
            <!-- TAB: HOME (Stats + Generation) -->
            <div id="tab-home" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card"><h3>الإجمالي</h3><div id="stat-total" class="val">0</div></div>
                    <div class="stat-card"><h3>أونلاين</h3><div id="stat-active-now" class="val" style="color:var(--success)">0</div></div>
                    <div class="stat-card"><h3>يتداولون</h3><div id="stat-trading-now" class="val" style="color:var(--primary)">0</div></div>
                </div>

                <div class="action-box">
                    <h2>✨ إنشاء سيريال جديد</h2>
                    <div class="input-group">
                        <label>كود التفعيل</label>
                        <input type="text" id="new-key" readonly style="letter-spacing: 2px; color: var(--primary); font-weight: 800;">
                    </div>
                    <div class="input-group">
                        <label>المدة</label>
                        <select id="duration">
                            <option value="0.000694">دقيقة واحدة (تجربة)</option>
                            <option value="30">شهر واحد</option>
                            <option value="90">3 أشهر</option>
                            <option value="365">سنة كاملة</option>
                            <option value="9999">مدى الحياة</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>اسم العميل</label>
                        <input type="text" id="client-name" placeholder="أدخل اسم العميل هنا">
                    </div>
                    <button class="btn" onclick="generateLicense()">إنشاء وتفعيل السيريال</button>
                </div>
            </div>

            <!-- TAB: CLIENTS (Search + Table) -->
            <div id="tab-clients" class="tab-content">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="ابحث بالاسم، السيريال، أو ID الجهاز..." oninput="filterList()">
                </div>

                <div class="table-box">
                    <table>
                        <thead>
                            <tr>
                                <th>العميل</th>
                                <th>الاتصال</th>
                                <th>السيريال</th>
                                <th>التداول</th>
                                <th>الجهاز (Device ID)</th>
                                <th>الانتهاء</th>
                                <th>الإجراء</th>
                            </tr>
                        </thead>
                        <tbody id="license-table"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/licenses";
        const ADMIN_PASS = "778899";
        let allData = {};

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw-admin.js'); });
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function checkPass() {
            if(document.getElementById('admin-pass').value === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                setInterval(fetchLicenses, 3000); fetchLicenses();
            } else { document.getElementById('login-err').style.display = 'block'; }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        function generateRandomKey() {
            const p = () => Math.random().toString(36).substring(2, 6).toUpperCase();
            return `JMF-${p()}-${p()}-${p()}`;
        }
        document.getElementById('new-key').value = generateRandomKey();

        async function fetchLicenses() {
            try {
                const response = await fetch(`${FB_URL}.json`);
                allData = await response.json() || {};
                filterList();
            } catch (e) {}
        }

        function filterList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = {};
            Object.keys(allData).forEach(k => {
                const item = allData[k];
                if (item.client?.toLowerCase().includes(query) || k.toLowerCase().includes(query) || (item.device_id && item.device_id.toLowerCase().includes(query))) {
                    filtered[k] = item;
                }
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('license-table');
            tbody.innerHTML = "";
            let t=0, onlineCount=0, tradingCount=0; const now = Date.now();
            
            Object.keys(data).reverse().forEach(key => {
                const item = data[key]; t++;
                const isOnline = item.last_seen && (now - item.last_seen < 120000);
                const isTrading = item.is_trading === true;
                const isExp = item.expiry < now;
                
                if(isOnline) onlineCount++;
                if(isOnline && isTrading) tradingCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="العميل" style="font-weight: 800;">${item.client || '-'}</td>
                    <td data-label="الاتصال">
                        <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                        <span style="color:${isOnline ? 'var(--success)' : '#64748b'}">${isOnline ? 'نشط' : 'خامل'}</span>
                    </td>
                    <td data-label="السيريال" style="font-family:monospace; color: var(--primary); font-size:11px; font-weight:800;">${key}</td>
                    <td data-label="التداول">
                        <span class="trading-badge ${isTrading && isOnline ? 'trading-active' : 'trading-idle'}">
                            ${isTrading && isOnline ? '🚀 فعال' : '🛑 متوقف'}
                        </span>
                    </td>
                    <td data-label="ID الجهاز" style="font-size:10px; color: var(--text-muted); font-family:monospace;">${item.device_id || '---'}</td>
                    <td data-label="الانتهاء" style="color:${isExp ? 'var(--danger)' : 'inherit'}; font-weight:800;">
                        ${item.expiry > 9e12 ? 'Unlimited' : new Date(item.expiry).toLocaleDateString('ar-EG')}
                    </td>
                    <td data-label="إجراءات" class="action-btns">
                        <button class="icon-btn copy" onclick="copyKey('${key}')">نسخ</button>
                        <button class="icon-btn del" onclick="deleteLicense('${key}')">حذف</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-total').innerText = Object.keys(allData).length;
            document.getElementById('stat-active-now').innerText = onlineCount;
            document.getElementById('stat-trading-now').innerText = tradingCount;
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            showToast("تم النسخ بنجاح ✅");
        }

        async function generateLicense() {
            const key = document.getElementById('new-key').value;
            const dur = parseFloat(document.getElementById('duration').value);
            const client = document.getElementById('client-name').value;
            if(!client) return alert("الاسم مطلوب");
            const payload = { client, created: Date.now(), expiry: Date.now() + Math.round(dur * 864e5), active: true, device_id: "", is_trading: false, last_seen: 0 };
            
            // Auto copy to clipboard
            navigator.clipboard.writeText(key);
            
            await fetch(`${FB_URL}/${key}.json`, { method: 'PUT', body: JSON.stringify(payload) });
            document.getElementById('new-key').value = generateRandomKey();
            document.getElementById('client-name').value = ""; fetchLicenses();
            showToast("تم الإنشاء والنسخ تلقائياً ✅");
        }

        async function deleteLicense(key) {
            await fetch(`${FB_URL}/${key}.json`, { method: 'DELETE' });
            fetchLicenses();
            showToast("تم الحذف بنجاح 🗑️");
        }
    </script>
</body>
</html>
