<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMF BOT | لوحة المدير السرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --panel: #0f172a; --primary: #00d4ff; --secondary: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.15);
            --danger: #ef4444; --success: #10b981;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        
        /* Login Screen */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box {
            background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; width: 90%; max-width: 400px;
        }
        .login-box input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155;
            background: #000; color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 20px;
        }

        /* Dashboard */
        #dashboard { display: none; }
        .header { background: var(--panel); padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; }
        .action-box { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 40px; }
        .input-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        .btn { background: linear-gradient(to right, var(--primary), var(--secondary)); border: none; color: #000; font-weight: 800; padding: 0 30px; border-radius: 10px; cursor: pointer; transition: 0.3s; height: 48px; margin-top: auto; }
        .table-box { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 800px; }
        th { background: rgba(0, 212, 255, 0.05); padding: 15px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-expired { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary)">الوصول للمدير فقط</h2>
            <p style="color: var(--text-muted)">يرجى إدخال كلمة المرور السرية</p>
            <input type="password" id="admin-pass" placeholder="••••••">
            <button class="btn" style="width: 100%" onclick="checkPass()">دخول اللوحة</button>
            <p id="login-err" style="color: var(--danger); margin-top: 15px; display: none;">❌ كلمة المرور خاطئة!</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="header">
            <h1>JMF Admin Control</h1>
            <button class="icon-btn" style="width: auto; padding: 0 15px;" onclick="location.reload()">تسجيل خروج</button>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card"><h3>إجمالي التراخيص</h3><div id="stat-total" style="font-size:32px; font-weight:800;">0</div></div>
                <div class="stat-card"><h3>نشط</h3><div id="stat-active" style="font-size:32px; font-weight:800; color:var(--success)">0</div></div>
                <div class="stat-card"><h3>منتهي</h3><div id="stat-expired" style="font-size:32px; font-weight:800; color:var(--danger)">0</div></div>
            </div>

            <div class="action-box">
                <h2>➕ توليد ترخيص جديد</h2>
                <div class="input-row">
                    <div class="input-group"><label>السيريال</label><input type="text" id="new-key" readonly></div>
                    <div class="input-group"><label>المدة</label>
                        <select id="duration" style="background:#000; color:#fff; padding:12px; border-radius:10px; border:1px solid #334155;">
                            <option value="30">شهر</option><option value="90">3 أشهر</option><option value="365">سنة</option><option value="9999">مدى الحياة</option>
                        </select>
                    </div>
                    <div class="input-group"><label>العميل</label><input type="text" id="client-name" placeholder="الاسم"></div>
                    <button class="btn" onclick="generateLicense()">إنشاء وتفعيل</button>
                </div>
            </div>

            <div class="table-box">
                <table>
                    <thead><tr><th>العميل</th><th>السيريال</th><th>البدء</th><th>الانتهاء</th><th>الحالة</th><th>ID الجهاز</th><th>حذف</th></tr></thead>
                    <tbody id="license-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/licenses";
        const ADMIN_PASS = "778899"; // <--- كلمة السر هنا

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchLicenses();
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function generateRandomKey() {
            const p = () => Math.random().toString(36).substring(2, 6).toUpperCase();
            return `JMF-${p()}-${p()}-${p()}`;
        }
        document.getElementById('new-key').value = generateRandomKey();

        async function fetchLicenses() {
            try {
                const response = await fetch(`${FB_URL}.json`);
                const data = await response.json();
                renderTable(data);
            } catch (e) {}
        }

        function renderTable(data) {
            const tbody = document.getElementById('license-table');
            tbody.innerHTML = ""; if(!data) return;
            let t=0, a=0, e=0; const now = Date.now();
            Object.keys(data).forEach(key => {
                const item = data[key]; t++;
                const isExp = item.expiry < now; if(isExp) e++; else a++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.client || '-'}</td><td style="font-family:monospace">${key}</td>
                    <td>${new Date(item.created).toLocaleDateString('ar-EG')}</td>
                    <td>${item.expiry > 9e12 ? 'Unlimited' : new Date(item.expiry).toLocaleDateString('ar-EG')}</td>
                    <td><span class="badge ${isExp ? 'badge-expired' : 'badge-active'}">${isExp ? 'منتهي' : 'نشط'}</span></td>
                    <td style="font-size:11px">${item.device_id || 'انتظار...'}</td>
                    <td><button class="icon-btn" onclick="deleteLicense('${key}')">🗑️</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-total').innerText = t;
            document.getElementById('stat-active').innerText = a;
            document.getElementById('stat-expired').innerText = e;
        }

        async function generateLicense() {
            const key = document.getElementById('new-key').value;
            const dur = parseInt(document.getElementById('duration').value);
            const client = document.getElementById('client-name').value;
            const now = Date.now();
            const payload = { client, created: now, expiry: now + (dur * 864e5), active: true, device_id: "" };
            await fetch(`${FB_URL}/${key}.json`, { method: 'PUT', body: JSON.stringify(payload) });
            document.getElementById('new-key').value = generateRandomKey();
            fetchLicenses();
        }

        async function deleteLicense(key) {
            if(confirm("حذف الترخيص؟")) {
                await fetch(`${FB_URL}/${key}.json`, { method: 'DELETE' });
                fetchLicenses();
            }
        }
    </script>
</body>
</html>
