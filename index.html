<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMF BOT | لوحة المدير الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --panel: #0f172a; --primary: #00d4ff; --secondary: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.15);
            --danger: #ef4444; --success: #10b981;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-box {
            background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        .login-box input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155;
            background: #000; color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 20px; outline: none;
        }

        #dashboard { display: none; }
        .header { background: var(--panel); padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary); }
        
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-card.active::after { background: var(--success); }
        .stat-card.expired::after { background: var(--danger); }
        
        .action-box { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .action-box h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--secondary); }
        
        .input-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .input-group { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
        input, select {
            background: #000; border: 1px solid #334155; color: #fff;
            padding: 14px; border-radius: 12px; font-size: 14px; outline: none; width: 100%;
        }
        input:focus { border-color: var(--primary); }
        
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #000; font-weight: 800; padding: 0 35px; border-radius: 12px;
            cursor: pointer; transition: 0.3s; height: 50px; font-size: 15px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4); }

        .table-box { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 1000px; }
        th { background: rgba(0, 212, 255, 0.05); padding: 18px; color: var(--primary); font-size: 13px; border-bottom: 1px solid var(--border); }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-expired { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .action-btns { display: flex; gap: 10px; }
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 12px;
        }
        .icon-btn:hover { background: var(--danger); border-color: var(--danger); }
        .copy-btn:hover { background: var(--primary); color: #000; }

        .realtime-indicator { font-size: 11px; color: var(--success); display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary); font-weight: 800;">JMF ADMIN</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">نظام إدارة التراخيص السحابي</p>
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button class="btn" style="width: 100%" onclick="checkPass()">دخول آمن</button>
            <p id="login-err" style="color: var(--danger); margin-top: 15px; display: none; font-weight: bold;">❌ كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>JMF Admin Control</h1>
            <div class="realtime-indicator">
                <div class="dot"></div>
                تحديث فوري (Real-time)
            </div>
            <button class="icon-btn" onclick="location.reload()" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);">تسجيل خروج</button>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card"><h3>إجمالي التراخيص</h3><div id="stat-total" style="font-size:32px; font-weight:800;">0</div></div>
                <div class="stat-card active"><h3>نشط الآن</h3><div id="stat-active" style="font-size:32px; font-weight:800; color:var(--success)">0</div></div>
                <div class="stat-card expired"><h3>منتهي الصلاحية</h3><div id="stat-expired" style="font-size:32px; font-weight:800; color:var(--danger)">0</div></div>
            </div>

            <div class="action-box">
                <h2>➕ إنشاء سيريال جديد</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label>كود التفعيل (تلقائي)</label>
                        <input type="text" id="new-key" readonly style="letter-spacing: 2px; font-weight: 800;">
                    </div>
                    <div class="input-group">
                        <label>مدة الاشتراك</label>
                        <select id="duration">
                            <option value="0.000694">دقيقة واحدة (تجربة)</option>
                            <option value="30">شهر واحد (30 يوم)</option>
                            <option value="90">3 أشهر</option>
                            <option value="365">سنة كاملة</option>
                            <option value="9999">مدى الحياة (Unlimited)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>اسم العميل</label>
                        <input type="text" id="client-name" placeholder="مثال: محمد العمري">
                    </div>
                    <button class="btn" onclick="generateLicense()">إنشاء وتفعيل</button>
                </div>
            </div>

            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>السيريال</th>
                            <th>تاريخ البدء</th>
                            <th>تاريخ الانتهاء</th>
                            <th>الحالة</th>
                            <th>معرف الجهاز (ID)</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="license-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/licenses";
        const ADMIN_PASS = "778899";

        function checkPass() {
            if(document.getElementById('admin-pass').value === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                startRealtimeUpdates();
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function generateRandomKey() {
            const p = () => Math.random().toString(36).substring(2, 6).toUpperCase();
            return `JMF-${p()}-${p()}-${p()}`;
        }
        document.getElementById('new-key').value = generateRandomKey();

        // التحديث الفوري (Real-time) كل ثانيتين
        function startRealtimeUpdates() {
            fetchLicenses();
            setInterval(fetchLicenses, 3000);
        }

        async function fetchLicenses() {
            try {
                const response = await fetch(`${FB_URL}.json`);
                const data = await response.json();
                renderTable(data);
            } catch (e) { console.error("Update Error:", e); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('license-table');
            tbody.innerHTML = ""; if(!data) return;
            let t=0, a=0, e=0; const now = Date.now();
            
            Object.keys(data).reverse().forEach(key => {
                const item = data[key]; t++;
                const isExp = item.expiry < now; if(isExp) e++; else a++;
                
                const expiryDate = new Date(item.expiry);
                const expiryStr = item.expiry > 9e12 ? 'Unlimited' : 
                                 (item.expiry - now < 864e5) ? expiryDate.toLocaleTimeString('ar-EG') : 
                                 expiryDate.toLocaleDateString('ar-EG');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600;">${item.client || '-'}</td>
                    <td style="font-family:monospace; font-weight: bold; color: var(--primary);">${key}</td>
                    <td>${new Date(item.created).toLocaleDateString('ar-EG')}</td>
                    <td style="color: ${item.expiry - now < 3600000 && !isExp ? 'var(--danger)' : 'inherit'}; font-weight: bold;">${expiryStr}</td>
                    <td><span class="badge ${isExp ? 'badge-expired' : 'badge-active'}">${isExp ? 'منتهي' : 'نشط'}</span></td>
                    <td style="font-size:11px; color: var(--text-muted);">${item.device_id || 'بانتظار التفعيل...'}</td>
                    <td class="action-btns">
                        <button class="icon-btn copy-btn" onclick="copyKey('${key}')">نسخ</button>
                        <button class="icon-btn" onclick="deleteLicense('${key}')" style="color: var(--danger);">حذف</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-total').innerText = t;
            document.getElementById('stat-active').innerText = a;
            document.getElementById('stat-expired').innerText = e;
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert("تم نسخ السيريال: " + key);
        }

        async function generateLicense() {
            const key = document.getElementById('new-key').value;
            const dur = parseFloat(document.getElementById('duration').value);
            const client = document.getElementById('client-name').value;
            if(!client) { alert("يرجى إدخال اسم العميل"); return; }
            
            const now = Date.now();
            const payload = { client, created: now, expiry: now + Math.round(dur * 86400000), active: true, device_id: "" };
            
            await fetch(`${FB_URL}/${key}.json`, { method: 'PUT', body: JSON.stringify(payload) });
            document.getElementById('new-key').value = generateRandomKey();
            document.getElementById('client-name').value = "";
            fetchLicenses();
        }

        async function deleteLicense(key) {
            if(confirm("هل أنت متأكد من حذف هذا الترخيص؟ سيتوقف البوت لدى العميل فوراً.")) {
                await fetch(`${FB_URL}/${key}.json`, { method: 'DELETE' });
                fetchLicenses();
            }
        }
    </script>
</body>
</html>
